upstream streamlit_backend {
    server 127.0.0.1:8502;
}

server {
    listen 8501;

    # Convert HEAD → GET for the health endpoint so monitoring tools
    # that only send HEAD (e.g. UptimeRobot free tier) receive 200 not 405.
    location = /_stcore/health {
        proxy_pass              http://streamlit_backend;
        proxy_method            GET;
        proxy_pass_request_body off;
    }

    # WebSocket stream used by Streamlit's live-update front-end.
    location /_stcore/stream {
        proxy_pass         http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # All other HTTP requests (static assets, page loads, etc.)
    location / {
        proxy_pass         http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
